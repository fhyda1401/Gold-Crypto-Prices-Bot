<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gold Crypto Pro - GCRY</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<!-- HEADER -->
<div class="text-center p-5 text-2xl font-bold">
  💰 Gold & Crypto Pro Dashboard
</div>

<!-- DASHBOARD -->
<div class="grid grid-cols-2 gap-4 p-4">

  <div class="bg-gray-900 p-4 rounded-xl">
    <h2 class="text-yellow-400">Gold Price</h2>
    <p id="gold">Loading...</p>
  </div>

  <div class="bg-gray-900 p-4 rounded-xl">
    <h2 class="text-orange-400">Bitcoin</h2>
    <p id="btc">Loading...</p>
  </div>

  <div class="bg-gray-900 p-4 rounded-xl">
    <h2 class="text-green-400">Ethereum</h2>
    <p id="eth">Loading...</p>
  </div>

  <div class="bg-gray-900 p-4 rounded-xl">
    <h2 class="text-blue-400">GCRY Wallet</h2>
    <p id="gcry">0 GCRY</p>
  </div>

</div>

<!-- CONVERTER -->
<div class="p-4 bg-gray-900 m-4 rounded-xl">
  <h2 class="text-xl mb-2">🔁 Converter</h2>

  <input id="amount" class="text-black p-2 rounded w-full" placeholder="Enter USD amount">

  <button onclick="convert()" class="bg-blue-600 p-2 mt-2 rounded w-full">
    Convert to Crypto
  </button>

  <p id="result" class="mt-2"></p>
</div>

<!-- REFERRAL + POINTS -->
<div class="p-4 bg-gray-900 m-4 rounded-xl">
  <h2>👥 Referral System</h2>
  <p>Your Points: <span id="points">0</span></p>
  <button onclick="addPoints()" class="bg-green-600 p-2 mt-2 rounded w-full">
    Earn Points
  </button>
</div>

<script>
let points = 0;
let gcryBalance = 120;

// 🔥 LOAD PRICES
async function loadPrices() {

  // Crypto
  let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd");
  let data = await res.json();

  document.getElementById("btc").innerText = "$ " + data.bitcoin.usd;
  document.getElementById("eth").innerText = "$ " + data.ethereum.usd;

  // Gold (fallback simple API)
  try {
    let goldRes = await fetch("https://api.metals.live/v1/spot/gold");
    let goldData = await goldRes.json();
    document.getElementById("gold").innerText = "$ " + goldData[0].price;
  } catch {
    document.getElementById("gold").innerText = "API Error";
  }

  // Wallet
  document.getElementById("gcry").innerText = gcryBalance + " GCRY";
}

loadPrices();
setInterval(loadPrices, 5000);

// 🔁 CONVERT FUNCTION
function convert() {
  let amount = document.getElementById("amount").value;

  let btc = amount / 65000;
  let eth = amount / 3500;

  document.getElementById("result").innerHTML =
    "BTC: " + btc.toFixed(6) + "<br>ETH: " + eth.toFixed(6);
}

// 👥 POINTS SYSTEM
function addPoints() {
  points += 10;
  document.getElementById("points").innerText = points;
  gcryBalance += 1;
}
</script>

</body>
</html>
