<!DOCTYPE html>
<html>
<head>
  <title>GCRY Finance Hub</title>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      background:#0f172a;
      color:white;
      font-family:Arial;
      margin:0;
      padding:0;
    }

    .header {
      padding:15px;
      background:#020617;
      text-align:center;
      font-size:20px;
    }

    .container {
      padding:10px;
    }

    .card {
      background:#1e293b;
      padding:15px;
      margin:10px 0;
      border-radius:12px;
    }

    button {
      background:#22c55e;
      border:none;
      padding:10px;
      border-radius:8px;
      color:white;
      margin-top:10px;
      width:100%;
    }

    .danger {
      background:#ef4444;
    }
  </style>
</head>

<body>

<div class="header">
🚀 GCRY Finance Hub
</div>

<div class="container">

<div class="card">
👤 User: <span id="user">Not logged</span>
<button onclick="login()">Login with Pi</button>
</div>

<div class="card">
💰 Balance: <span id="balance">50</span> GCRY
<button onclick="buy()">Buy GCRY (1 Pi)</button>
</div>

<div class="card">
🔔 Price Alerts
<button onclick="useFeature(1)">Activate (1 GCRY)</button>
</div>

<div class="card">
📈 Pro Signals
<button onclick="useFeature(5)">Unlock (5 GCRY)</button>
</div>

<div class="card">
👥 Referral System
<p>Invite friends and earn 2 GCRY</p>
<button onclick="addReferral()">Simulate Invite</button>
</div>

</div>

<script>

let balance = 50;

Pi.init({ version: "2.0" });

async function login(){
  try {
    const user = await Pi.authenticate(['username']);
    document.getElementById("user").innerText = user.username;
  } catch(e){
    alert("Login failed");
  }
}

async function buy(){
  try {
    await Pi.createPayment({
      amount: 1,
      memo: "Buy 10 GCRY",
      metadata: { type: "GCRY_PURCHASE" }
    });

    balance += 10;
    updateBalance();
    alert("You received 10 GCRY ✅");

  } catch(e){
    alert("Payment cancelled");
  }
}

function useFeature(cost){
  if(balance >= cost){
    balance -= cost;
    updateBalance();
    alert("Feature Activated ✅");
  } else {
    alert("Not enough GCRY ❌");
  }
}

function addReferral(){
  balance += 2;
  updateBalance();
  alert("Referral reward added 🎉");
}

function updateBalance(){
  document.getElementById("balance").innerText = balance;
}

</script>

</body>
</html>
